# ============================================
# Configuración del servidor Spring Boot
# ============================================
server.port=8080

# ============================================
# Configuración de base de datos MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/zapateria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# IMPORTANTE: cambia este valor por tu contraseña real de MySQL
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# Configuración de JPA/Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# Configuración de Jackson (JSON)
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
