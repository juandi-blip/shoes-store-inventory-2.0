# ============================================
# Configuración del servidor Spring Boot
# ============================================
server.port=8080

# ============================================
# Configuración de base de datos MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/shoesstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# La contraseña se lee de la variable de entorno DB_PASSWORD (no se escribe aquí).
# En NetBeans: Run > Set Project Configuration, o defínela en el sistema.
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# Configuración de JPA/Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# Configuración de Jackson (JSON)
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
